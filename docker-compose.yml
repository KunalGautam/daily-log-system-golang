services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: "8080"
      GIN_MODE: release
      BASE_URL: ${BASE_URL:-http://localhost:8080}
      DB_DRIVER: mysql
      DB_DSN: "${DB_USER:?}:${DB_PASSWORD:?}@tcp(${DB_HOST:?}:${DB_PORT:-3306})/${DB_NAME:?}?charset=utf8mb4&parseTime=True&loc=Local"
      JWT_SECRET: ${JWT_SECRET:?}
      MQTT_BROKER: "${MQTT_BROKER:?}"
      MQTT_CLIENT_ID: life-log-backend
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      NTFY_URL: "${NTFY_URL:?}"
      NTFY_TOPIC: ${NTFY_TOPIC:-life-log}
      NTFY_TOKEN: ${NTFY_TOKEN:-}
      NTFY_ENABLED: "true"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:4173}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api/v1}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8080/ws}
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
